name: Publish to GitHub Pages with Lunr Search Extension
on:
  push:
    branches: [main]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
concurrency:
  group: github-pages
  cancel-in-progress: false
# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    # Local Kroki avoids public kroki.io rate limits and 504s during asciidoctor-kroki fetches.
    services:
      mermaid:
        image: yuzutech/kroki-mermaid
      kroki:
        image: yuzutech/kroki
        ports:
          - 8000:8000
        env:
          KROKI_MERMAID_HOST: mermaid
        options: --tmpfs /tmp:exec
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      KROKI_SERVER_URL: http://localhost:8000
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with: 
        fetch-depth: 0

    - name: Configure Pages
      uses: actions/configure-pages@v5
    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Install Antora with the Antora Lunr Extension
      run: npm i antora @antora/lunr-extension

    - name: Wait for Kroki
      run: |
        set -e
        gateway_ok=0
        for i in $(seq 1 90); do
          if curl -fsS --max-time 5 "http://localhost:8000/" >/dev/null 2>&1; then
            echo "Kroki gateway is up (attempt $i)"
            gateway_ok=1
            break
          fi
          sleep 2
        done
        if [ "$gateway_ok" != 1 ]; then
          echo "Kroki gateway did not become ready in time"
          exit 1
        fi
        # Minimal Mermaid diagram (graph LR; A-->B) via gateway + kroki-mermaid companion
        MERM_URL='http://localhost:8000/mermaid/svg/eNpLL0osyFDwCbJWcNTVtXMCACcQBEc'
        for i in $(seq 1 45); do
          if curl -fsS --max-time 30 "$MERM_URL" -o /tmp/kroki-mermaid-smoke.svg; then
            echo "Kroki Mermaid path is healthy (attempt $i)"
            exit 0
          fi
          sleep 2
        done
        echo "Kroki Mermaid did not become ready in time"
        exit 1

    - name: Generate Site
      run: make

    - name: Upload Artifacts
      uses: actions/upload-pages-artifact@v3
      with:
        path: build/site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
